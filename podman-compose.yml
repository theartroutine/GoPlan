name: goplan

services:
  # -------- Database Service --------
  postgresql-goplan:
    image: postgres:16-alpine
    container_name: postgres-db-goplan
    env_file:
      - ./backend/db.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------- Redis (Channel Layer) --------
  redis-messaging:
    image: redis:7-alpine
    container_name: redis-messaging-goplan
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------- Mailpit (Dev Email) --------
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-goplan
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP — Django sends email here
    restart: unless-stopped

  # -------- Django Backend Service --------
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: backend:latest
    container_name: backend-goplan
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:Z
      - mediadata:/app/media_files
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis-messaging:6379/1
      CELERY_RESULT_BACKEND: redis://redis-messaging:6379/2
    depends_on:
      postgresql-goplan:
        condition: service_healthy
      redis-messaging:
        condition: service_healthy

  # -------- Backend AI Worker Service --------
  backend-worker:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: backend:latest
    container_name: backend-worker-goplan
    command: celery -A configs worker -l info
    volumes:
      - ./backend:/app:Z
      - mediadata:/app/media_files
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis-messaging:6379/1
      CELERY_RESULT_BACKEND: redis://redis-messaging:6379/2
    restart: unless-stopped
    depends_on:
      postgresql-goplan:
        condition: service_healthy
      redis-messaging:
        condition: service_healthy

  # -------- Backend Memory Render Worker Service --------
  backend-memory-render-worker:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: backend:latest
    container_name: backend-memory-render-worker-goplan
    command: celery -A configs worker -l info -Q memory_render --concurrency=1
    volumes:
      - ./backend:/app:Z
      - mediadata:/app/media_files
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis-messaging:6379/1
      CELERY_RESULT_BACKEND: redis://redis-messaging:6379/2
    restart: unless-stopped
    depends_on:
      postgresql-goplan:
        condition: service_healthy
      redis-messaging:
        condition: service_healthy

  # -------- Backend Scheduler Service --------
  backend-scheduler:
    image: backend:latest
    container_name: backend-scheduler-goplan
    command: bash -c "while true; do python manage.py dispatch_timeline_reminders || echo 'dispatch_timeline_reminders failed'; python manage.py recover_ai_interactions || echo 'recover_ai_interactions failed'; python manage.py recover_memory_renders || echo 'recover_memory_renders failed'; sleep 60; done"
    volumes:
      - ./backend:/app:Z
      - mediadata:/app/media_files
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis-messaging:6379/1
      CELERY_RESULT_BACKEND: redis://redis-messaging:6379/2
    restart: unless-stopped
    depends_on:
      postgresql-goplan:
        condition: service_healthy
      redis-messaging:
        condition: service_healthy

volumes:
  pgdata: {}
  redisdata: {}
  mediadata: {}
