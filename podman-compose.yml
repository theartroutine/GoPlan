version: "3.9"
name: goplan # TODO: Replace with the project slug (keep consistent across services and backend/.env)

services:
  # -------- Database Service --------
  postgresql-goplan:
    image: postgres:16-alpine
    container_name: postgres-db-goplan
    env_file:
      - ./backend/db.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # mongo:
  #   image: mongo:7
  #   container_name: mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodata:/data/db
  #   healthcheck:
  #     test: ["CMD", "mongosh --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

  # -------- Redis (Channel Layer) --------
  redis-messaging:
    image: redis:7-alpine
    container_name: redis-messaging-goplan
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------- Mailpit (Dev Email) --------
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-goplan
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP — Django sends email here
    restart: unless-stopped

  # -------- Django Backend Service --------
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: backend:latest
    container_name: backend-goplan
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000" # Run "podman compose exec backend python manage.py makemigrations" when schema changes; swap the runserver part for "daphne -b 0.0.0.0 -p 8000 configs.asgi:application" if using ASGI
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:Z
    env_file:
      - ./backend/.env
    depends_on:
      postgresql-goplan:
        condition: service_healthy
      # mongo:
      #   condition: service_healthy
      redis-messaging:
        condition: service_healthy

volumes:
  pgdata: {}
  # mongodata: {}
  redisdata: {}
